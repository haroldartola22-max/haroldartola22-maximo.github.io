<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecofresh - Configuración</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #fff; color: #111; }
        
        header { background-color: #1a4a2e; color: white; padding: 15px 20px; display: flex; align-items: center; }
        .back-btn { text-decoration: none; color: white; font-size: 20px; margin-right: 15px; }
        
        .menu-container { max-width: 600px; margin: 0 auto; border: 1px solid #ddd; }

        .section-header { background-color: #f3f3f3; padding: 15px 20px; border-bottom: 1px solid #ddd; }
        .section-header h3 { margin: 0; font-size: 16px; color: #555; text-transform: uppercase; }

        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; text-decoration: none; color: #111; font-size: 15px; border-bottom: 1px solid #eee; }
        .menu-item:hover { background-color: #f7f7f7; }
        
        .chevron { color: #888; font-weight: bold; }

        .config-row { display: flex; align-items: center; padding: 15px 20px; gap: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .config-row:hover { background-color: #f7f7f7; }
    </style>
</head>
