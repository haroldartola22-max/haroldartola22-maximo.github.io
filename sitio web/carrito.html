<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecofresh - Mi Carrito</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f3f3;
        }

        header {
            background-color: #1a4a2e;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            color: white;
        }

        main {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
        }

        /* Sección de la lista de productos */
        .seccion-productos {
            flex: 2;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Sección del resumen de pago (estilo Amazon/Temu) */
        .seccion-pago {
            flex: 1;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .producto-en-carrito {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
        }

        .info-producto {
            display: flex;
            flex-direction: column;
        }

        .nombre-p {
            font-weight: bold;
            font-size: 18px;
            color: #007185;
        }

        .precio-p {
            color: #B12704;
            font-weight: bold;
        }

        .btn-eliminar {
            background: none;
            border: none;
            color: #007185;
            cursor: pointer;
            text-decoration: underline;
            font-size: 13px;
        }

        .btn-comprar {
            background-color: #ffd814;
            border: 1px solid #fcd200;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
        }

        .btn-vaciar {
            background-color: #e7e7e7;
            border: 1px solid #adb1b8;
            border-radius: 8px;
            padding: 5px 10px;
            cursor: pointer;
            margin-top: 20px;
        }

        .total-texto {
            font-size: 20px;
            font-weight: bold;
        }

        .carrito-vacio {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">ECOFRESH</a>
        <nav>
            <a href="index.html" style="color: white; text-decoration: none;">Volver a la tienda</a>
        </nav>
    </header>

    <main id="contenedor-principal">
        <!-- Los productos aparecerán aquí dinámicamente -->
        <div class="seccion-productos" id="lista-carrito">
            <h2>Carrito de compras</h2>
            <div id="items-carrito">
                <!-- JavaScript llenará esto -->
            </div>
        </div>

        <div class="seccion-pago" id="resumen-pago">
            <div class="total-texto">Subtotal: <span id="precio-total">Q0.00</span></div>
            <p style="font-size: 13px; color: green;">¡Tu pedido califica para envío GRATIS!</p>
            <button class="btn-comprar" onclick="realizarCompra()">Proceder al pago</button>
            <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar carrito</button>
        </div>
    </main>

    <script>
        function cargarCarrito() {
            const listaItems = document.getElementById('items-carrito');
            const precioTotalTxt = document.getElementById('precio-total');
            
            // Obtenemos los productos de la "memoria" del navegador
            let carrito = JSON.parse(localStorage.getItem('miCarrito')) || [];
            
            if (carrito.length === 0) {
                listaItems.innerHTML = `<div class="carrito-vacio">
                    <h3>Tu carrito está vacío.</h3>
                    <a href="index.html">Ir a buscar productos</a>
                </div>`;
                precioTotalTxt.innerText = "Q0.00";
                return;
            }

            listaItems.innerHTML = "";
            let total = 0;

            carrito.forEach((producto, index) => {
                total += producto.precio;
                listaItems.innerHTML += `
                    <div class="producto-en-carrito">
                        <div class="info-producto">
                            <span class="nombre-p">${producto.nombre}</span>
                            <span style="color: green; font-size: 12px;">En stock</span>
                            <button class="btn-eliminar" onclick="eliminarProducto(${index})">Eliminar</button>
                        </div>
                        <div class="precio-p">Q${producto.precio.toFixed(2)}</div>
                    </div>
                `;
            });

            precioTotalTxt.innerText = `Q${total.toFixed(2)}`;
        }

        function eliminarProducto(index) {
            let carrito = JSON.parse(localStorage.getItem('miCarrito'));
            carrito.splice(index, 1); // Borra el producto seleccionado
            localStorage.setItem('miCarrito', JSON.stringify(carrito));
            cargarCarrito(); // Recarga la lista
        }

        function vaciarCarrito() {
            localStorage.removeItem('miCarrito');
            cargarCarrito();
        }

        function realizarCompra() {
            alert("¡Gracias por tu interés! Esta es una actividad escolar, pero así es como funcionaría el proceso de pago real.");
        }

        // Ejecutar al abrir la página
        window.onload = cargarCarrito;
    </script>
</body>
</html>
