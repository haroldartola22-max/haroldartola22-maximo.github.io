<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecofresh - Ofertas Relámpago</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f3f3f3; }
        
        header { background-color: #1a4a2e; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; text-decoration: none; color: white; }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-size: 14px; }

        /* Banner de Ofertas Estilo Temu */
        .banner-ofertas {
            background: linear-gradient(135deg, #0984f7, #54aadb);
            color: white;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
        }

        .contador-oferta {
            font-size: 18px;
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            margin-top: 10px;
        }

        main { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Cuadrícula de Ofertas */
        .grid-ofertas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .tarjeta-oferta {
            background: white;
            border-radius: 12px;
            padding: 15px;
            position: relative;
            border: 2px solid #468fee;
            transition: 0.3s;
        }

        .tarjeta-oferta:hover { transform: scale(1.03); }

        /* Etiqueta de Porcentaje */
        .badge-descuento {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #d9e62e;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .img-sim { height: 120px; background: #fff5f5; display: flex; align-items: center; justify-content: center; font-size: 50px; margin-bottom: 10px; }
        
        .nombre-p { font-weight: bold; font-size: 15px; margin-bottom: 10px; color: #333; display: block; }
        
        /* Precios */
        .precio-antes {
            color: #777;
            text-decoration: line-through;
            font-size: 14px;
        }

        .precio-ahora {
            color: #fcf961;
            font-size: 22px;
            font-weight: bold;
            display: block;
            margin: 5px 0;
        }

        .btn-oferta {
            background: #1a4a2e;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-oferta:hover { background: #2d7a4d; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">ECOFRESH</a>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="categoria.html">Categorías</a>
            <a href="carrito.html">Carrito</a>
        </nav>
    </header>

    <div class="banner-ofertas">
        <h1>⚡ OFERTAS RELÁMPAGO ⚡</h1>
        <p>Precios de liquidación en productos seleccionados.</p>
        <div class="contador-oferta">Termina en: <span id="timer">02:59:59</span></div>
    </div>

    <main>
        <div class="grid-ofertas" id="contenedor-ofertas">
            <!-- Los productos en oferta se generan aquí -->
        </div>
    </main>

    <script>
        const ofertas = [
            {n: 'Detergente lavatrastes biodegradable', antes: 35, ahora: 25, desc: '-28%', i: '🧼'},
            {n: 'Cepillo de dientes de bambú', antes: 15, ahora: 9, desc: '-40%', i: '🎋'},
            {n: 'Jabón corporal artesanal', antes: 25, ahora: 18, desc: '-28%', i: '🧼'},
            {n: 'Limpia pisos de coco (Litro)', antes: 40, ahora: 30, desc: '-25%', i: '🥥'},
            {n: 'Bicarbonato de sodio (1kg)', antes: 20, ahora: 15, desc: '-25%', i: '⚪'},
            {n: 'Esponjas de fibra vegetal', antes: 15, ahora: 10, desc: '-33%', i: '🧽'},
            {n: 'Champú sólido en pastilla', antes: 55, ahora: 45, desc: '-18%', i: '🧼'},
            {n: 'Desinfectante natural cítrico', antes: 30, ahora: 22, desc: '-26%', i: '🍋'}
        ];

        function cargarOfertas() {
            const container = document.getElementById('contenedor-ofertas');
            ofertas.forEach(o => {
                container.innerHTML += `
                    <div class="tarjeta-oferta">
                        <div class="badge-descuento">${o.desc}</div>
                        <div class="img-sim">${o.i}</div>
                        <span class="nombre-p">${o.n}</span>
                        <span class="precio-antes">Q${o.antes}.00</span>
                        <span class="precio-ahora">Q${o.ahora}.00</span>
                        <button class="btn-oferta" onclick="agregar('${o.n}', ${o.ahora})">¡Lo quiero!</button>
                    </div>
                `;
            });
        }

        function agregar(nombre, precio) {
            let carrito = JSON.parse(localStorage.getItem('miCarrito')) || [];
            carrito.push({ nombre: nombre + " (OFERTA)", precio: precio });
            localStorage.setItem('miCarrito', JSON.stringify(carrito));
            alert('¡Oferta aprovechada! Se agregó al carrito.');
        }

        // Un pequeño efecto de contador para que parezca Temu
        function startTimer() {
            let duration = 3 * 60 * 60; // 3 horas
            let timerDisplay = document.getElementById('timer');
            setInterval(() => {
                let h = parseInt(duration / 3600, 10);
                let m = parseInt((duration % 3600) / 60, 10);
                let s = parseInt(duration % 60, 10);
                timerDisplay.textContent = `${h < 10 ? "0"+h : h}:${m < 10 ? "0"+m : m}:${s < 10 ? "0"+s : s}`;
                if (--duration < 0) duration = 3 * 60 * 60;
            }, 1000);
        }

        window.onload = () => {
            cargarOfertas();
            startTimer();
        };
    </script>
</body>
</html>
